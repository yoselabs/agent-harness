[project]
name = "ai-harness"
version = "0.1.0"
description = "AI-first harness engineering — deterministic controls for AI agents"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
]

[project.scripts]
ai-harness = "ai_harness.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_harness"]
